# Codecov configuration
# Docs: https://docs.codecov.com/docs/codecov-yaml
coverage:
  status:
    project:
      default:
        # Allow a small drop so routine changes don't fail the check.
        target: auto
        threshold: 1%
    patch:
      default:
        # New/changed lines should be reasonably covered.
        target: auto
        threshold: 1%

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false

# Files that hold no executable code or are not part of the published library.
ignore:
  - "src/**/*.test.ts"
  - "src/**/*.spec.ts"
  - "src/**/types.ts"
  - "dist/**"
