name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        vitest: ['3', '4']
    name: build-and-test (vitest ${{ matrix.vitest }})
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.21'

      - name: Install dependencies
        run: bun install

      - name: Pin Vitest ${{ matrix.vitest }}
        run: bun add -d vitest@${{ matrix.vitest }}

      - name: Build
        run: bun run build

      - name: Test
        if: matrix.vitest != '4'
        run: bun run test run

      - name: Test with coverage
        if: matrix.vitest == '4'
        run: bun run test:coverage

      - name: Upload coverage to Codecov
        if: matrix.vitest == '4'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: cadesalaberry/vitest-sentry-reporter
          files: ./coverage/lcov.info
          # Install the uploader from PyPI to avoid the binary's GPG
          # signature self-check, which is unreliable on the runners.
          use_pypi: true
          fail_ci_if_error: true

  quality:
    runs-on: ubuntu-latest
    name: lint & package checks
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.21'

      - name: Install dependencies
        run: bun install

      - name: Lint & format check (Biome)
        run: bunx biome ci .

      - name: Build
        run: bun run build

      - name: Validate package (publint)
        run: bunx publint

      - name: Validate types (are-the-types-wrong)
        run: bunx @arethetypeswrong/cli --pack . --profile esm-only



